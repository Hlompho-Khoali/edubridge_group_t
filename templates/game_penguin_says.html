{% extends "base.html" %}

{% block title %}Penguin Says - Impulse Control Game{% endblock %}

{% block content %}
<style>
    .game-container {
        max-width: 800px;
        margin: 0 auto;
        padding: 20px;
        text-align: center;
    }
    
    .penguin {
        font-size: 100px;
        margin: 20px;
        animation: bounce 1s ease infinite;
    }
    
    @keyframes bounce {
        0%, 100% { transform: translateY(0); }
        50% { transform: translateY(-10px); }
    }
    
    .instruction {
        font-size: 28px;
        font-weight: bold;
        padding: 30px;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        color: white;
        border-radius: 20px;
        margin: 20px 0;
        min-height: 150px;
        display: flex;
        align-items: center;
        justify-content: center;
    }
    
    .buttons {
        display: flex;
        gap: 20px;
        justify-content: center;
        margin: 30px 0;
    }
    
    .btn-yes {
        background: #48bb78;
        color: white;
        padding: 15px 40px;
        font-size: 1.2rem;
        border: none;
        border-radius: 50px;
        cursor: pointer;
        transition: transform 0.2s;
    }
    
    .btn-no {
        background: #e53e3e;
        color: white;
        padding: 15px 40px;
        font-size: 1.2rem;
        border: none;
        border-radius: 50px;
        cursor: pointer;
        transition: transform 0.2s;
    }
    
    .btn-yes:hover, .btn-no:hover {
        transform: scale(1.05);
    }
    
    .score-board {
        display: flex;
        justify-content: space-between;
        background: #f7fafc;
        padding: 15px 25px;
        border-radius: 15px;
        margin-bottom: 20px;
    }
    
    .score-item {
        text-align: center;
    }
    
    .score-value {
        font-size: 1.8rem;
        font-weight: bold;
        color: #667eea;
    }
    
    .feedback {
        padding: 15px;
        border-radius: 10px;
        margin: 20px 0;
        font-size: 1.1rem;
    }
    
    .feedback-correct {
        background: #d4edda;
        color: #155724;
    }
    
    .feedback-wrong {
        background: #f8d7da;
        color: #721c24;
    }
    
    .next-btn {
        background: #667eea;
        color: white;
        padding: 12px 30px;
        font-size: 1rem;
        border: none;
        border-radius: 25px;
        cursor: pointer;
        margin-top: 20px;
    }
    
    .game-complete {
        position: fixed;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        color: white;
        padding: 40px;
        border-radius: 20px;
        text-align: center;
        z-index: 1000;
        min-width: 400px;
    }
    
    .game-complete h2 {
        font-size: 2rem;
        margin-bottom: 20px;
    }
    
    .game-complete button {
        background: white;
        color: #667eea;
        padding: 10px 25px;
        border: none;
        border-radius: 25px;
        cursor: pointer;
        margin-top: 20px;
    }
    
    .overlay {
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        background: rgba(0,0,0,0.7);
        z-index: 999;
    }
    
    @media (max-width: 600px) {
        .instruction {
            font-size: 20px;
        }
        .btn-yes, .btn-no {
            padding: 12px 25px;
        }
    }
</style>

<div class="game-container">
    <div class="score-board">
        <div class="score-item">
            <div class="score-value" id="score">0</div>
            <div>Score</div>
        </div>
        <div class="score-item">
            <div class="score-value" id="round">0</div>
            <div>/ <span id="totalRounds">10</span></div>
        </div>
        <div class="score-item">
            <div class="score-value" id="reactionTime">0</div>
            <div>ms (avg)</div>
        </div>
    </div>
    
    <div class="penguin">🐧</div>
    
    <div class="instruction" id="instruction">
        Get ready...
    </div>
    
    <div class="buttons">
        <button class="btn-yes" onclick="makeChoice(true)">YES - Do it</button>
        <button class="btn-no" onclick="makeChoice(false)">NO - Don't do it</button>
    </div>
    
    <div id="feedback" class="feedback"></div>
</div>

<script>
    const rounds = [
        { text: "Penguin says: Touch your nose!", shouldDo: true },
        { text: "Stand up from your chair!", shouldDo: false },
        { text: "Penguin says: Clap your hands!", shouldDo: true },
        { text: "Jump up and down!", shouldDo: false },
        { text: "Penguin says: Smile!", shouldDo: true },
        { text: "Wave your hand!", shouldDo: false },
        { text: "Penguin says: Blink your eyes!", shouldDo: true },
        { text: "Stomp your feet!", shouldDo: false },
        { text: "Penguin says: Say 'Hello'!", shouldDo: true },
        { text: "Spin around!", shouldDo: false }
    ];
    
    let currentRound = 0;
    let score = 0;
    let reactionTimes = [];
    let roundStartTime = null;
    let waitingForResponse = true;
    let timeoutId = null;
    
    const totalRounds = rounds.length;
    document.getElementById('totalRounds').innerText = totalRounds;
    
    function loadRound() {
        if (currentRound >= totalRounds) {
            finishGame();
            return;
        }
        
        waitingForResponse = true;
        roundStartTime = Date.now();
        
        const round = rounds[currentRound];
        document.getElementById('instruction').innerHTML = round.text;
        document.getElementById('feedback').innerHTML = '';
        document.getElementById('round').innerText = currentRound + 1;
        
        // Auto-fail after 5 seconds
        timeoutId = setTimeout(() => {
            if (waitingForResponse) {
                noResponse();
            }
        }, 5000);
    }
    
    function makeChoice(choice) {
        if (!waitingForResponse) return;
        
        clearTimeout(timeoutId);
        waitingForResponse = false;
        
        const reactionTime = Date.now() - roundStartTime;
        reactionTimes.push(reactionTime);
        updateAverageReaction();
        
        const round = rounds[currentRound];
        const isCorrect = (choice === round.shouldDo);
        
        if (isCorrect) {
            score += 10;
            document.getElementById('score').innerText = score;
            showFeedback(true, reactionTime);
        } else {
            showFeedback(false, reactionTime);
        }
        
        setTimeout(() => {
            currentRound++;
            loadRound();
        }, 1500);
    }
    
    function noResponse() {
        if (!waitingForResponse) return;
        
        waitingForResponse = false;
        showFeedback(false, 5000, true);
        
        setTimeout(() => {
            currentRound++;
            loadRound();
        }, 1500);
    }
    
    function showFeedback(isCorrect, reactionTime, isTimeout = false) {
        const feedbackDiv = document.getElementById('feedback');
        
        if (isTimeout) {
            feedbackDiv.innerHTML = '⏰ Time\'s up! Too slow!';
            feedbackDiv.className = 'feedback feedback-wrong';
        } else if (isCorrect) {
            feedbackDiv.innerHTML = `✅ CORRECT! (${reactionTime}ms)`;
            feedbackDiv.className = 'feedback feedback-correct';
        } else {
            feedbackDiv.innerHTML = `❌ WRONG! You should have ${rounds[currentRound].shouldDo ? 'done it' : 'waited'}.`;
            feedbackDiv.className = 'feedback feedback-wrong';
        }
    }
    
    function updateAverageReaction() {
        if (reactionTimes.length === 0) return;
        const avg = Math.round(reactionTimes.reduce((a, b) => a + b, 0) / reactionTimes.length);
        document.getElementById('reactionTime').innerText = avg;
    }
    
function finishGame() {
    const percentage = (score / (totalRounds * 10)) * 100;
    const passed = percentage >= 70;
    const avgReaction = reactionTimes.length > 0 
        ? Math.round(reactionTimes.reduce((a, b) => a + b, 0) / reactionTimes.length)
        : 0;
    
    // Show completion screen
    const overlay = document.createElement('div');
    overlay.className = 'overlay';
    document.body.appendChild(overlay);
    
    const completeDiv = document.createElement('div');
    completeDiv.className = 'game-complete';
    completeDiv.innerHTML = `
        <h2>${passed ? '🎉 GAME COMPLETE! 🎉' : 'Game Complete'}</h2>
        <p>Score: ${score} / ${totalRounds * 10}</p>
        <p>Percentage: ${percentage}%</p>
        <p>Average Reaction: ${avgReaction}ms</p>
        <div class="loading-next">Loading next game...</div>
    `;
    document.body.appendChild(completeDiv);
    
    // Send completion to server
    fetch('/game/complete-and-next', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
            game_id: {{ game.id }},
            assignment_id: {{ assignment_id }},
            percentage: percentage,
            score: score,
            passed: passed,
            phase: {{ phase|default(1) }}
        })
    })
    .then(response => response.json())
    .then(data => {
        if (data.next_game) {
            setTimeout(() => {
                window.location.href = '/play/phase/' + data.phase;
            }, 2000);
        } else {
            setTimeout(() => {
                window.location.href = '/learner/dashboard';
            }, 2000);
        }
    });
}
</script>
{% endblock %}
