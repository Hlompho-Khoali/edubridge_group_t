{% extends "base.html" %}

{% block title %}Login{% endblock %}

{% block content %}
<style>
    .login-container {
        max-width: 400px;
        margin: 0 auto;
        padding: 20px;
    }
    
    .form-group {
        margin-bottom: 20px;
    }
    
    label {
        display: block;
        margin-bottom: 5px;
        font-weight: bold;
        color: #333;
    }
    
    input {
        width: 100%;
        padding: 10px;
        border: 1px solid #ddd;
        border-radius: 5px;
        font-size: 1rem;
    }
    
    .btn-login {
        width: 100%;
        padding: 12px;
        font-size: 1.1rem;
    }
    
    .register-links {
        text-align: center;
        margin-top: 20px;
    }
    
    .register-links a {
        color: #667eea;
        text-decoration: none;
        margin: 0 10px;
    }
    
    .helper-text {
        color: #666;
        font-size: 0.8rem;
        margin-top: 5px;
        display: block;
    }
    
    .learner-link {
        text-align: center;
        margin-top: 15px;
    }
    
    .learner-link a {
        color: #667eea;
        text-decoration: none;
    }
</style>

<div class="login-container">
    <h2 style="text-align: center; color: #667eea; margin-bottom: 30px;">Login to EduBridge</h2>
    
    <form method="POST">
        <div class="form-group">
            <label for="email">Email Address</label>
            <input type="text" id="email" name="email" required placeholder="Enter your email address">
            <small class="helper-text">Learners can also use their 13-digit ID number</small>
        </div>
        
        <div class="form-group">
            <label for="password">Password</label>
            <input type="password" id="password" name="password" required placeholder="Enter your password">
        </div>
        
        <button type="submit" class="btn btn-primary btn-login">Login</button>
    </form>
    
    <div class="register-links">
        <p>New to EduBridge?</p>
        <a href="{{ url_for('register_educator') }}">Register as Educator</a> |
        <a href="{{ url_for('register_parent') }}">Register as Parent</a>
    </div>
    
    <div class="learner-link">
        <a href="{{ url_for('learner_login') }}">Learner Login (6-digit code)</a>
    </div>
</div>
{% endblock %}
