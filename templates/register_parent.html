{% extends "base.html" %}

{% block title %}Register Parent{% endblock %}

{% block content %}
<style>
    .register-container {
        max-width: 500px;
        margin: 0 auto;
        padding: 20px;
    }
    
    .form-group {
        margin-bottom: 20px;
    }
    
    label {
        display: block;
        margin-bottom: 5px;
        font-weight: bold;
        color: #333;
    }
    
    input {
        width: 100%;
        padding: 10px;
        border: 1px solid #ddd;
        border-radius: 5px;
        font-size: 1rem;
    }
    
    .btn-register {
        width: 100%;
        padding: 12px;
        font-size: 1.1rem;
    }
    
    .info-box {
        background: #e7f3ff;
        padding: 15px;
        border-radius: 10px;
        margin-bottom: 20px;
        font-size: 0.9rem;
    }
</style>

<div class="register-container">
    <h2 style="text-align: center; color: #667eea; margin-bottom: 30px;">Register as Parent</h2>
    
    <div class="info-box">
        Your ID number will be used to link your children to your account. Keep it safe!
    </div>
    
    <form method="POST">
        <div class="form-group">
            <label for="name">Full Name</label>
            <input type="text" id="name" name="name" required placeholder="Enter your full name">
        </div>
        
        <div class="form-group">
            <label for="email">Email Address</label>
            <input type="email" id="email" name="email" required placeholder="Enter your email">
        </div>
        
        <div class="form-group">
            <label for="id_number">ID Number </label>
            <input type="text" id="id_number" name="id_number" required placeholder="Enter a unique ID number">
        </div>
        
        <div class="form-group">
            <label for="password">Password</label>
            <input type="password" id="password" name="password" required placeholder="Create a password">
        </div>
        
        <button type="submit" class="btn btn-primary btn-register">Register</button>
    </form>
    
    <p style="text-align: center; margin-top: 20px;">
        Already have an account? <a href="{{ url_for('login') }}" style="color: #667eea;">Login here</a>
    </p>
</div>
{% endblock %}
